<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doof Playground</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>Doof Playground</h1>
      <div id="toolbar-actions">
        <button id="run-button" type="button">Run</button>
      </div>
      <span id="status">Ready</span>
    </header>
    <main id="editors">
      <div id="editor-left">
        <div class="editor-label">Doof</div>
        <div id="doof-editor" class="editor-container"></div>
      </div>
      <div id="editor-right">
        <div class="editor-label">C++ Output</div>
        <div id="cpp-editor" class="editor-container"></div>
        <section id="run-panel" class="output-panel is-hidden" aria-hidden="true">
          <div class="panel-header">
            <span class="panel-title">Run Output</span>
            <span id="run-status" class="panel-status"></span>
            <button id="run-panel-close" type="button" class="panel-close" aria-label="Close run output">Close</button>
          </div>
          <div id="run-output"></div>
        </section>
      </div>
    </main>
    <footer id="error-panel">
      <div class="panel-header">
        <span class="panel-title">Diagnostics</span>
        <span id="error-count"></span>
      </div>
      <div id="error-list"></div>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
