<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doof Observer</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Doof Observer</p>
          <h1>Runtime metrics</h1>
        </div>
        <div class="status">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="toolbar" aria-label="Metrics controls">
        <label class="search">
          <span>Filter</span>
          <input id="filterInput" type="search" placeholder="metric name">
        </label>
        <div class="updated">Updated <span id="updatedAt">never</span></div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th class="number">Value</th>
              </tr>
            </thead>
            <tbody id="metricsBody"></tbody>
          </table>
        </div>
        <p id="emptyState" class="empty">No metrics yet.</p>
      </section>

      <section class="panel raw-panel">
        <div class="raw-header">
          <h2>Prometheus</h2>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <pre id="rawMetrics"></pre>
      </section>
    </main>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
